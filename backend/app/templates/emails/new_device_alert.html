<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 40px;">
<div style="max-width: 560px; margin: 0 auto; background: #1e293b; border-radius: 12px; padding: 40px; border: 1px solid #334155;">
  <div style="text-align: center; margin-bottom: 32px;">
    <h1 style="color: #38bdf8; margin: 0; font-size: 28px;">⚡ Conduit</h1>
    <p style="color: #94a3b8; margin: 4px 0 0;">MEP Intelligence. Connected.</p>
  </div>
  <h2 style="color: #f59e0b; margin-bottom: 16px;">⚠️ New Login Detected</h2>
  <p style="line-height: 1.6; color: #cbd5e1;">A new login to your Conduit account was detected:</p>
  <div style="background: #0f172a; border-radius: 8px; padding: 16px; margin: 16px 0;">
    <p style="margin: 4px 0; color: #94a3b8;"><strong>Device:</strong> {{device_info}}</p>
    <p style="margin: 4px 0; color: #94a3b8;"><strong>IP Address:</strong> {{ip_address}}</p>
  </div>
  <p style="line-height: 1.6; color: #cbd5e1;">If this wasn't you, please reset your password immediately.</p>
  <hr style="border: none; border-top: 1px solid #334155; margin: 32px 0;">
  <p style="color: #64748b; font-size: 13px; text-align: center;">Bliss Systems LLC — Conduit by Bliss Systems</p>
</div>
</body>
</html>
