name: conduit_mobile
description: "Conduit — MEP Intelligence. Connected. Field technician app."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State management ─────────────────────────────────────────────
  # We use the manual Riverpod API (Provider, NotifierProvider, etc.) —
  # no @riverpod annotations, so riverpod_annotation/_generator/_lint
  # are deliberately omitted.
  flutter_riverpod: ^2.5.1

  # ── Routing ──────────────────────────────────────────────────────
  go_router: ^14.6.0

  # ── HTTP + API ───────────────────────────────────────────────────
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0
  connectivity_plus: ^6.1.0

  # ── Local persistence ────────────────────────────────────────────
  hive_ce: ^2.7.1
  hive_ce_flutter: ^2.1.0
  path_provider: ^2.1.5

  # ── Secure storage (JWT, refresh token) ──────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Firebase / FCM ───────────────────────────────────────────────
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # ── Camera + photo viewer ────────────────────────────────────────
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  image: ^4.3.0
  geolocator: ^13.0.2

  # ── Voice + speech ───────────────────────────────────────────────
  speech_to_text: ^7.0.0

  # ── UI ───────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1

  # ── Utils ────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.1
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Code generation: only the three actively used by lib/ + test/ files.
  build_runner: ^2.4.13
  retrofit_generator: ^9.1.5
  json_serializable: ^6.9.0
  hive_ce_generator: ^1.7.0
  # Mocking
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
