# Conduit CI/CD Pipeline
# ═══════════════════════════════════════════════════════
# Trigger: push/PR to main
# Jobs:
#   1. test    — pytest (Ubuntu, fakeredis, SQLite async)
#   2. build   — Docker image → GHCR
#   3. deploy  — SSH into VPS → docker compose pull + up
#
# Required GitHub Secrets:
#   VPS_SSH_PRIVATE_KEY   — /home/onecpd/.ssh/conduit_deploy (private)
#   VPS_HOST              — 72.249.68.148
#   VPS_PORT              — 6543
#   VPS_USER              — onecpd
#   VPS_DEPLOY_PATH       — /home/onecpd/conduit
#   GHCR_TOKEN            — GitHub PAT with packages:write
#   ENV_PRODUCTION        — Full .env content (multiline secret)
#
# Bliss Systems LLC — APEX Standard
# ═══════════════════════════════════════════════════════

name: Conduit CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: yarodmo/conduit

jobs:
  # ══════════════════════════════════════
  # JOB 1 — TEST
  # ══════════════════════════════════════
  test:
    name: 🧪 Test Suite (170 tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          pip install poetry==1.8.3
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        working-directory: backend
        run: poetry install --with dev

      - name: Run tests
        working-directory: backend
        env:
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key-minimum-32-chars-ok
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          JWT_PRIVATE_KEY: ""
          JWT_PUBLIC_KEY: ""
          SMTP_HOST: localhost
          SMTP_PORT: 587
          SMTP_USER: test@test.com
          SMTP_PASSWORD: test
          SMTP_FROM: test@test.com
          FRONTEND_URL: http://localhost:3000
          ALLOWED_ORIGINS: http://localhost:3000
        run: |
          poetry run pytest tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=48 \
            -x

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/.coverage

  # ══════════════════════════════════════
  # JOB 1.5 — MOBILE TEST SUITE (Flutter)
  # Runs analyze + test on every push touching mobile/
  # ══════════════════════════════════════
  mobile-test:
    name: 📱 Mobile Test Suite (Flutter)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect mobile changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            mobile:
              - 'mobile/**'
              - '.github/workflows/ci.yml'

      - name: Set up Flutter
        if: steps.changes.outputs.mobile == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.5"
          cache: true

      - name: Bootstrap platform code
        if: steps.changes.outputs.mobile == 'true'
        working-directory: mobile
        run: |
          # Generates android/, ios/, etc. without overwriting lib/
          flutter create --project-name=conduit_mobile \
            --org=com.blissystems \
            --platforms=android,ios . || true

      - name: Install dependencies
        if: steps.changes.outputs.mobile == 'true'
        working-directory: mobile
        run: flutter pub get

      - name: Run build_runner (generated files)
        if: steps.changes.outputs.mobile == 'true'
        working-directory: mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Static analysis
        if: steps.changes.outputs.mobile == 'true'
        working-directory: mobile
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        if: steps.changes.outputs.mobile == 'true'
        working-directory: mobile
        run: flutter test --reporter=expanded

  # ══════════════════════════════════════
  # JOB 2 — BUILD & PUSH IMAGE
  # Only on push to main (not on PRs)
  # ══════════════════════════════════════
  build:
    name: 🐳 Build & Push GHCR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════
  # JOB 3 — DEPLOY TO VPS
  # Only on push to main after build passes
  # ══════════════════════════════════════
  deploy:
    name: 🚀 Deploy → api.climbpeakdigital.com
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://api.climbpeakdigital.com/health

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p ${{ secrets.VPS_DEPLOY_PATH }}
            cat > ${{ secrets.VPS_DEPLOY_PATH }}/.env << 'ENVEOF'
            ${{ secrets.ENV_PRODUCTION }}
            ENVEOF
            chmod 600 ${{ secrets.VPS_DEPLOY_PATH }}/.env

      - name: Copy docker-compose + .htaccess to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.prod.yml,deploy/.htaccess"
          target: ${{ secrets.VPS_DEPLOY_PATH }}/
          strip_components: 0

      - name: Move .htaccess to deploy root
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cp ${{ secrets.VPS_DEPLOY_PATH }}/deploy/.htaccess ${{ secrets.VPS_DEPLOY_PATH }}/.htaccess
            rm -rf ${{ secrets.VPS_DEPLOY_PATH }}/deploy

      - name: Deploy containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Pull latest image
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u yarodmo --password-stdin
            docker compose -f docker-compose.prod.yml pull

            # Rolling restart (zero downtime)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for container to be running (needed before alembic exec)
            echo "Waiting for conduit_api to start..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Status}}' conduit_api 2>/dev/null || echo "missing")
              [ "$STATUS" = "running" ] && echo "Container running (${i}x5s)" && break
              echo "  attempt $i: $STATUS"; sleep 5
            done

            # Run migrations
            docker exec --workdir /app conduit_api alembic upgrade head

            # Health check — retry 20x / 5s = 100s max
            # Port 3007 (CSF whitelist 3000:3200, alineado con hitdash 3005)
            echo "Waiting for app on port 3007..."
            APP_OK=0
            for i in $(seq 1 20); do
              if curl -sf http://127.0.0.1:3007/health > /dev/null 2>&1; then
                echo "✅ App healthy (attempt $i)"
                APP_OK=1
                break
              fi
              echo "  attempt $i: not ready"; sleep 5
            done

            # Public health via Apache + HTTPS
            if [ "$APP_OK" = "1" ]; then
              echo "Validating public endpoint..."
              curl -sf -m 15 https://api.climbpeakdigital.com/health \
                && echo "✅ Public HTTPS healthy" \
                || echo "⚠️  Internal OK but public failed (Apache/SSL?)"
            fi

            docker logs conduit_api --tail 20 2>&1 || true

            if [ "$APP_OK" != "1" ]; then
              echo "❌ App never became healthy — rolling back"
              docker compose -f docker-compose.prod.yml down
              exit 1
            fi

            echo "✅ Conduit deployed successfully"

      - name: Notify success
        if: success()
        run: echo "🚀 Deployed to https://api.climbpeakdigital.com — SHA ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deploy FAILED — check logs"
